<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>식당 추천 시스템 - 실시간 GUI</title>
  <style>
    :root {
      --primary: #7494bc;
      --primary-dark: #587fab;
      --primary-deep: #355d89;
      --primary-soft: #d9e9fa;
      --primary-pale: #eef7ff;
      --primary-faint: #f8fbff;
      --surface: #ffffff;
      --border: #bdd4ea;
      --text: #294866;
      --text-soft: #6685a3;
      --secondary: #8eb8d8;
      --danger: #dc8fa7;
      --danger-dark: #bd6984;
      --success: #75b69c;
      --success-soft: #e3f7ef;
      --warning: #e2bd72;
      --lavender: #eee7ff;
      --peach: #fff0e4;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #dff2ff 0%, #eee7ff 52%, #fff0e4 100%);
      min-height: 100vh;
      padding: 12px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
    }

    header {
      color: var(--primary-deep);
      text-align: center;
      margin-bottom: 10px;
    }

    header h1 {
      font-size: 1.8em;
      margin-bottom: 2px;
    }

    header p {
      font-size: 0.92em;
      opacity: 0.9;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(189, 212, 234, 0.9);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(82, 127, 171, 0.14);
    }

    .card h2 {
      margin-bottom: 10px;
      color: var(--text);
      font-size: 1.18em;
      border-bottom: 2px solid var(--primary);
      padding-bottom: 7px;
    }

    .form-group {
      margin-bottom: 9px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: var(--text);
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 1em;
      transition: border-color 0.3s;
      background: var(--surface);
      color: var(--text);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(116, 148, 188, 0.18);
    }

    button {
      background: linear-gradient(135deg, var(--primary), #86a4d0);
      color: white;
      padding: 9px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      font-weight: 600;
      transition: background 0.3s;
      width: 100%;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button:active {
      transform: scale(0.98);
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      color: var(--text);
      font-weight: 600;
    }

    .toggle-row input {
      width: auto;
    }

    .radio-options {
      display: flex;
      gap: 8px;
    }

    .radio-options label {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 7px;
      margin: 0;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      background: var(--surface);
    }

    .radio-options input {
      width: auto;
      padding: 0;
    }

    .qr-panel {
      display: none;
      margin-top: 15px;
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary-pale), var(--lavender));
    }

    .qr-grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 15px;
      align-items: center;
    }

    #qrCode {
      width: 180px;
      height: 180px;
      display: grid;
      place-items: center;
      background: white;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .join-link {
      word-break: break-all;
      color: var(--primary-deep);
      font-size: 0.92em;
      line-height: 1.45;
    }

    .danger-btn {
      background: var(--danger);
    }

    .danger-btn:hover {
      background: var(--danger-dark);
    }

    .secondary-btn {
      background: var(--secondary);
    }

    .secondary-btn:hover {
      background: var(--primary-dark);
    }

    .participants-list {
      max-height: 300px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 10px;
      background: linear-gradient(135deg, var(--primary-faint), #f5fbff);
    }

    .participant-item {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .participant-item strong {
      color: var(--primary-deep);
    }

    .user-folders {
      max-height: 210px;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary-faint), #f8f4ff);
    }

    .user-folder {
      min-width: 0;
      padding: 10px 6px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: var(--surface);
      text-align: center;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
      cursor: pointer;
      user-select: none;
    }

    .user-folder:hover {
      transform: translateY(-2px);
      border-color: #adc2da;
      box-shadow: 0 6px 14px rgba(88, 119, 159, 0.16);
    }

    .user-folder.selected {
      border-color: var(--primary);
      background: #d9ebfb;
      box-shadow: inset 0 0 0 2px var(--primary), 0 6px 14px rgba(88, 119, 159, 0.18);
    }

    .user-folder.selected .folder-icon {
      transform: scale(1.08);
    }

    .selection-status {
      margin-bottom: 8px;
      color: var(--text-soft);
      font-size: 0.88em;
      font-weight: 700;
    }

    .folder-icon {
      display: block;
      margin-bottom: 5px;
      font-size: 2.4em;
      line-height: 1;
      filter: drop-shadow(0 3px 3px rgba(116, 148, 188, 0.22));
    }

    .folder-id {
      display: block;
      color: var(--primary-deep);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.86em;
      font-weight: 800;
      white-space: nowrap;
    }

    .remove-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.9em;
    }

    .remove-btn:hover {
      background: var(--danger-dark);
    }

    .results {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 15px;
    }

    .terminal-log {
      flex: 1;
      height: calc(100% - 42px);
      min-height: 0;
      background: #304f70;
      color: #dce7f3;
      border-radius: 8px;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.82em;
      line-height: 1.45;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .terminal-screen {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow: hidden;
    }

    .terminal-line {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .terminal-prompt {
      color: #a9c5e3;
      font-weight: 800;
    }

    .terminal-command {
      color: #f7faff;
      font-weight: 800;
    }

    .terminal-output {
      color: #c5d8e9;
    }

    .terminal-status {
      display: inline-block;
      margin-top: 12px;
      padding: 5px 8px;
      border: 1px solid rgba(220, 231, 243, 0.3);
      border-radius: 999px;
      color: #dce7f3;
      font-size: 0.86em;
    }

    .terminal-cursor::after {
      content: "";
      display: inline-block;
      width: 7px;
      height: 1em;
      margin-left: 3px;
      background: #dce7f3;
      vertical-align: -0.15em;
      animation: blink 0.9s steps(2, start) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .group-card {
      background: linear-gradient(135deg, #d9ebfb 0%, #eee5ff 100%);
      color: var(--primary-deep);
      border: 1px solid #b8d3eb;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(67, 95, 132, 0.24);
    }

    .group-card h3 {
      margin-bottom: 15px;
      font-size: 1.3em;
      border-bottom: 2px solid rgba(116, 148, 188, 0.35);
      padding-bottom: 10px;
    }

    .members {
      font-size: 0.95em;
      margin-bottom: 15px;
      opacity: 0.9;
    }

    .restaurant {
      background: rgba(255, 255, 255, 0.72);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 5px;
      border-left: 3px solid var(--primary);
    }

    .restaurant-name {
      font-weight: 600;
      font-size: 1.05em;
      margin-bottom: 5px;
    }

    .restaurant-info {
      font-size: 0.9em;
      opacity: 0.85;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .status {
      padding: 10px 15px;
      border-radius: 5px;
      text-align: center;
      font-weight: 600;
      margin-bottom: 15px;
    }

    .status.loading {
      background: #f3ead7;
      color: #7f6940;
    }

    .status.success {
      background: var(--success);
      color: white;
    }

    .status.error {
      background: var(--danger);
      color: white;
    }

    .step-indicator {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      gap: 10px;
    }

    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #cbd6e2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: white;
    }

    .step.active {
      background: var(--primary);
    }

    .step.completed {
      background: var(--success);
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .score {
      font-weight: 700;
      font-size: 1.1em;
      margin-top: 5px;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      .main-grid {
        grid-template-columns: 1fr;
      }

      header h1 {
        font-size: 1.8em;
      }

      .qr-grid {
        grid-template-columns: 1fr;
      }

      .terminal-log {
        min-height: 300px;
      }
    }

    @media (min-width: 769px) {
      body {
        height: 100vh;
        overflow: hidden;
      }

      .container {
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .main-grid {
        flex: 1;
        min-height: 0;
        grid-template-columns: minmax(310px, 0.95fr) minmax(330px, 1.05fr) minmax(360px, 1.15fr);
      }

      .main-grid > .card {
        height: 100%;
        min-height: 0;
        overflow-y: auto;
      }

      .main-grid > .card:last-child {
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>🍽️ 식당 추천 시스템</h1>
      <p>실시간 데이터 처리 및 시각화 GUI</p>
    </header>

    <div class="main-grid">
      <!-- 모바일 수집 세션 설정 -->
      <div class="card">
        <h2>📱 모바일 수집 세션</h2>
        
        <div class="form-group">
          <label>그룹 수</label>
          <input type="number" id="groupCount" value="2" min="1" max="5">
        </div>

        <div class="form-group">
          <label>위치</label>
          <input type="text" id="location" value="세종대학교" placeholder="예: 세종대학교">
        </div>

        <div class="form-group">
          <label>식당 검색 provider</label>
          <select id="provider">
            <option value="naver" selected>naver (네이버 지역 검색)</option>
            <option value="mock">mock (API 키 없이 테스트)</option>
          </select>
        </div>

        <div class="form-group">
          <label>예상 도보 시간</label>
          <select id="walkingMinutes">
            <option value="0" selected>전체</option>
            <option value="5">5분 이내</option>
            <option value="10">10분 이내</option>
            <option value="15">15분 이내</option>
            <option value="20">20분 이내</option>
            <option value="25">25분 이내</option>
            <option value="30">30분 이내</option>
          </select>
          <div style="margin-top: 6px; color: var(--text-soft); font-size: 0.82em;">Naver 좌표 기반 예상치이며 실제 보행 경로와 다를 수 있습니다.</div>
        </div>

        <div class="form-group">
          <label>리뷰 인기순 필터</label>
          <select id="reviewTopN">
            <option value="0" selected>전체</option>
            <option value="1">검색어별 리뷰 많은 순 상위 1개</option>
            <option value="3">검색어별 리뷰 많은 순 상위 3개</option>
            <option value="5">검색어별 리뷰 많은 순 상위 5개</option>
          </select>
          <div style="margin-top: 6px; color: var(--text-soft); font-size: 0.82em;">Naver 공식 API는 리뷰 개수 대신 리뷰 수 정렬만 제공합니다.</div>
        </div>

        <div class="form-group">
          <label>‘안갈래요’ 목록</label>
          <div class="radio-options">
            <label>
              <input type="radio" name="useExclusions" value="true" checked> 사용
            </label>
            <label>
              <input type="radio" name="useExclusions" value="false"> 미사용
            </label>
          </div>
        </div>

        <div id="mobileBaseUrlGroup" class="form-group">
          <label>모바일 접속 주소</label>
          <input type="text" id="mobileBaseUrl" placeholder="예: http://192.168.0.10:5000">
          <button type="button" class="secondary-btn" style="margin-top: 8px;" onclick="loadNetworkInfo()">접속 주소 자동 감지</button>
        </div>

        <button onclick="createSession()">✨ 모바일 접수 시작</button>

        <div id="sessionStatus" style="margin-top: 10px; display: none;" class="status"></div>
        <div id="sessionId" style="margin-top: 10px; color: var(--text-soft); font-size: 0.9em; display: none;"></div>
        <div id="qrPanel" class="qr-panel">
          <div class="qr-grid">
            <div id="qrCode"></div>
            <div>
              <h3 style="margin-bottom: 8px; color: var(--text);">모바일 접수 QR</h3>
              <div id="joinLink" class="join-link"></div>
              <div id="mobileCount" style="margin-top: 10px; color: var(--text-soft); font-weight: 600;">참가자 0명 접수</div>
            </div>
          </div>
        </div>

        <div style="margin-top: 12px;">
          <button class="danger-btn" onclick="closeAndGenerate()">마감 및 실행</button>
        </div>
      </div>

      <!-- 참가자 목록 및 결과 -->
      <div class="card">
        <h2>📊 참가자 및 결과</h2>

        <div id="userFoldersContainer">
          <h3 style="margin: 8px 0 5px;">📁 이번 세션 참여자 선택</h3>
          <div class="selection-status" id="selectionStatus">폴더를 눌러 함께 추천받을 사용자를 선택하세요.</div>
          <div class="user-folders" id="userFolders">
            <div style="color: var(--text-soft);">사용자 폴더를 불러오는 중...</div>
          </div>
        </div>

        <div id="participantsContainer" style="display: none;">
          <h3 style="margin-top: 15px; margin-bottom: 10px;">참가자 목록</h3>
          <div class="participants-list" id="participantsList"></div>
        </div>

        <div id="resultsContainer" style="display: none; margin-top: 20px;">
          <h3 style="margin-bottom: 15px;">🎯 추천 결과</h3>
          <div class="results" id="results"></div>
        </div>

        <div id="noData" style="color: var(--text-soft); text-align: center; padding: 40px 20px;">
          아직 세션이 시작되지 않았습니다
        </div>
      </div>

      <div class="card">
        <h2>⌨️ 리눅스 명령어 처리 과정</h2>
        <div class="terminal-log" id="cliLog">
          <div class="terminal-screen">
            <div class="terminal-line terminal-output">서버 CLI 로그에 연결하는 중...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentSessionId = null;
    let participants = [];
    let participantPoll = null;
    let terminalPoll = null;
    let cliEventCursor = -1;
    let cliEventQueue = [];
    let cliQueueRunning = false;
    let userFolderPoll = null;
    let selectedParticipantIds = new Set();

    async function loadNetworkInfo() {
      try {
        const response = await fetch('/api/network-info');
        const data = await response.json();
        const input = document.getElementById('mobileBaseUrl');
        input.value = data.recommended || data.base_urls?.[0] || window.location.origin;
      } catch (e) {
        document.getElementById('mobileBaseUrl').value = window.location.origin;
      }
    }

    async function createSession() {
      const groupCount = parseInt(document.getElementById('groupCount').value);
      const location = document.getElementById('location').value;
      const provider = document.getElementById('provider').value;
      const walkingMinutes = parseInt(document.getElementById('walkingMinutes').value);
      const reviewTopN = parseInt(document.getElementById('reviewTopN').value);
      const useExclusions = document.querySelector('input[name="useExclusions"]:checked').value === 'true';
      const publicBaseUrl = document.getElementById('mobileBaseUrl').value.trim();

      try {
        const response = await fetch('/api/session/create', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            groups: groupCount,
            location,
            provider,
            walking_minutes: walkingMinutes,
            review_top_n: reviewTopN,
            use_exclusions: useExclusions,
            mobile_enabled: true,
            participant_ids: Array.from(selectedParticipantIds),
            public_base_url: publicBaseUrl
          })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || '세션 생성 실패');
        }
        currentSessionId = data.session_id;
        participants = data.participants || [];

        document.getElementById('sessionStatus').style.display = 'block';
        document.getElementById('sessionStatus').textContent =
          `✅ 세션 생성됨: ${currentSessionId} · 샘플 ${data.sample_participant_count || 0}명 포함 · 전체 ${participants.length}명 · 안갈래요 ${data.use_exclusions ? '사용' : '미사용'}`;
        document.getElementById('sessionStatus').className = 'status success';
        document.getElementById('sessionId').style.display = 'block';
        document.getElementById('sessionId').textContent = `세션 ID: ${currentSessionId}`;
        document.getElementById('noData').style.display = 'none';
        document.getElementById('participantsContainer').style.display = 'block';
        document.getElementById('resultsContainer').style.display = 'none';
        renderQrPanel(data.join_url || '');
        updateParticipantsList();
        loadUserFolders();
        startParticipantPolling();
      } catch (e) {
        alert('세션 생성 실패: ' + e.message);
      }
    }

    function renderQrPanel(joinUrl) {
      const panel = document.getElementById('qrPanel');
      const qrCode = document.getElementById('qrCode');
      const joinLink = document.getElementById('joinLink');
      qrCode.innerHTML = '';

      if (!joinUrl) {
        panel.style.display = 'none';
        return;
      }

      panel.style.display = 'block';
      joinLink.innerHTML = `<a href="${joinUrl}" target="_blank" rel="noopener">${joinUrl}</a>`;
      if (window.QRCode) {
        new QRCode(qrCode, {text: joinUrl, width: 180, height: 180});
      } else {
        qrCode.textContent = 'QR 라이브러리를 불러오지 못했습니다';
      }
    }

    function startParticipantPolling() {
      if (participantPoll) {
        clearInterval(participantPoll);
      }
      refreshSession();
      participantPoll = setInterval(refreshSession, 2500);
      if (userFolderPoll) {
        clearInterval(userFolderPoll);
      }
      userFolderPoll = setInterval(loadUserFolders, 2500);
    }

    async function refreshSession() {
      if (!currentSessionId) {
        return;
      }
      try {
        const response = await fetch(`/api/session/${currentSessionId}`);
        if (!response.ok) {
          return;
        }
        const data = await response.json();
        participants = data.participants || [];
        updateParticipantsList();
      } catch (e) {
        console.error('세션 갱신 실패:', e);
      }
    }

    function updateParticipantsList() {
      const list = document.getElementById('participantsList');
      document.getElementById('mobileCount').textContent = `참가자 ${participants.length}명 접수`;
      list.innerHTML = participants.map((p, i) => `
        <div class="participant-item">
          <strong>${escapeHtml(p.display_name || p.original_user_id || p.user_id || '이름 없음')}</strong>
          <span style="color: var(--text-soft); font-size: 0.9em;">${p.source === 'mobile' ? '모바일' : '예시'}</span>
        </div>
      `).join('');
    }

    async function loadUserFolders() {
      try {
        const response = await fetch('/api/participants', {cache: 'no-store'});
        if (!response.ok) {
          return;
        }
        const data = await response.json();
        const folders = data.participants || [];
        const container = document.getElementById('userFolders');
        container.innerHTML = folders.length
          ? folders.map(folder => `
              <div class="user-folder ${folder.source === 'demo' || selectedParticipantIds.has(folder.participant_id) ? 'selected' : ''}"
                   ${folder.source === 'demo' ? '' : `onclick="toggleParticipantSelection('${escapeHtml(folder.participant_id)}')"`}>
                <span class="folder-icon" aria-hidden="true">📁</span>
                <span class="folder-id">${escapeHtml(folder.user_id || '이름 없음')}</span>
              </div>
            `).join('')
          : '<div style="color: var(--text-soft);">저장된 사용자 폴더가 없습니다.</div>';
        updateSelectionStatus();
      } catch (e) {
        console.error('사용자 폴더 목록 갱신 실패:', e);
      }
    }

    function toggleParticipantSelection(participantId) {
      if (selectedParticipantIds.has(participantId)) {
        selectedParticipantIds.delete(participantId);
      } else {
        selectedParticipantIds.add(participantId);
      }
      loadUserFolders();
    }

    function updateSelectionStatus() {
      const count = selectedParticipantIds.size;
      document.getElementById('selectionStatus').textContent = count
        ? `샘플 10명은 항상 포함 · 실제 사용자 ${count}명 추가 선택됨`
        : '샘플 참가자 10명은 항상 포함됩니다. 실제 사용자 폴더를 눌러 추가하세요.';
    }

    function removeParticipant(index) {
      participants.splice(index, 1);
      updateParticipantsList();
    }

    async function generateRecommendations() {
      await refreshSession();
      if (!currentSessionId || participants.length === 0) {
        alert('세션을 생성하고 참가자를 추가해주세요');
        return;
      }

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '<div style="grid-column: 1/-1;"><div class="spinner"></div> 추천 생성 중...</div>';
      appendTerminalEvent({type: 'output', text: '── 추천 CLI 실행 요청 ──'});
      document.getElementById('resultsContainer').style.display = 'block';

      try {
        const response = await fetch(`/api/session/${currentSessionId}/generate-recommendations`, {
          method: 'POST'
        });
        const data = await response.json();
        if (data.job_id) {
          pollRecommendationJob(data.job_id);
        } else {
          throw new Error(data.error || '추천 job 생성 실패');
        }
      } catch (e) {
        resultsDiv.innerHTML = '<div style="grid-column: 1/-1; color: var(--danger-dark);">오류: ' + e.message + '</div>';
        appendTerminalEvent({type: 'output', text: '내부 명령 실행 중 오류: ' + e.message});
      }
    }

    function appendTerminalEvent(event) {
      const cliLog = document.getElementById('cliLog');
      const screen = cliLog.querySelector('.terminal-screen');
      if (event.type === 'command') {
        screen.innerHTML = '';
      }
      const line = document.createElement('div');
      line.className = event.type === 'command'
        ? 'terminal-line terminal-command'
        : 'terminal-line terminal-output';
      line.innerHTML = event.type === 'command'
        ? `<span class="terminal-prompt">$ </span>${escapeHtml(event.text)}`
        : escapeHtml(event.text);
      screen.appendChild(line);
      while (screen.children.length > 8) {
        const removable = screen.children[0].classList.contains('terminal-command')
          ? screen.children[1]
          : screen.children[0];
        if (!removable) {
          break;
        }
        removable.remove();
      }
    }

    function queueTerminalEvents(events) {
      cliEventQueue.push(...events);
      if (!cliQueueRunning) {
        drainTerminalQueue();
      }
    }

    function drainTerminalQueue() {
      const event = cliEventQueue.shift();
      if (!event) {
        cliQueueRunning = false;
        return;
      }
      cliQueueRunning = true;
      appendTerminalEvent(event);
      const delay = event.type === 'command' ? 250 : 20;
      setTimeout(drainTerminalQueue, delay);
    }

    async function pollCliEvents() {
      try {
        const response = await fetch(`/api/cli-events?after=${cliEventCursor}`, {cache: 'no-store'});
        if (!response.ok) {
          return;
        }
        const data = await response.json();
        const events = data.events || [];
        if (events.length) {
          cliEventCursor = Math.max(cliEventCursor, ...events.map(event => event.id));
          queueTerminalEvents(events);
        }
      } catch (e) {
        console.error('CLI 로그 갱신 실패:', e);
      }
    }

    function startCliPolling() {
      const cliLog = document.getElementById('cliLog');
      cliLog.innerHTML = '<div class="terminal-screen"></div>';
      pollCliEvents();
      if (terminalPoll) {
        clearInterval(terminalPoll);
      }
      terminalPoll = setInterval(pollCliEvents, 250);
    }

    function renderRecommendationGroups(groups) {
      const resultsDiv = document.getElementById('results');
      if (participantPoll) {
        clearInterval(participantPoll);
        participantPoll = null;
      }
      resultsDiv.innerHTML = groups.map(group => `
        <div class="group-card">
          <h3>그룹 ${group.group_id}</h3>
          <div class="members">👥 ${(group.member_names || displayNamesForMembers(group.members)).map(escapeHtml).join(', ')}</div>
          ${group.recommendations.map((r, i) => `
            <div class="restaurant">
              <div class="restaurant-name">🏆 ${i + 1}. ${r.name}</div>
              <div class="restaurant-info">
                <div>🍽️ ${r.food}</div>
                <div>⭐ ${r.rating || '-'}</div>
                <div>🚶 ${r.walking_minutes ? `약 ${r.walking_minutes}분` : '-'}</div>
                <div>💬 ${r.review_rank ? `리뷰 인기순 ${r.review_rank}위` : '-'}</div>
              </div>
              <div style="font-size: 0.9em; opacity: 0.88; margin-top: 5px;">📍 ${r.distance_m ? `${r.distance_m}m` : (r.address || r.location || '-')}</div>
              <div class="score">점수: ${r.score}</div>
              <div style="font-size: 0.88em; opacity: 0.9; margin-top: 6px;">${r.reason || ''}</div>
            </div>
          `).join('')}
        </div>
      `).join('');
    }

    function displayNamesForMembers(memberIds) {
      const namesById = new Map(
        participants.map(participant => [
          participant.user_id,
          participant.display_name || participant.original_user_id || participant.user_id
        ])
      );
      return (memberIds || []).map(memberId => namesById.get(memberId) || memberId);
    }

    async function pollRecommendationJob(jobId) {
      const resultsDiv = document.getElementById('results');
      const poll = async () => {
        const response = await fetch(`/api/job/${jobId}`);
        const job = await response.json();

        if (job.status === 'completed') {
          queueTerminalEvents([{type: 'output', text: '완료: 추천 결과를 화면에 표시합니다.'}]);
          renderRecommendationGroups(job.result.groups || []);
          return true;
        } else if (job.status === 'failed') {
          resultsDiv.innerHTML = '<div style="grid-column: 1/-1; color: var(--danger-dark);">추천 생성 실패</div>';
          appendTerminalEvent({type: 'output', text: job.error || '추천 생성 실패'});
          return true;
        }
        return false;
      };

      if (await poll()) {
        return;
      }
      const jobPoll = setInterval(async () => {
        if (await poll()) {
          clearInterval(jobPoll);
        }
      }, 500);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function closeAndGenerate() {
      if (!currentSessionId) {
        alert('먼저 세션을 생성해주세요');
        return;
      }
      try {
        await fetch(`/api/session/${currentSessionId}/close`, {method: 'POST'});
        await generateRecommendations();
      } catch (e) {
        alert('마감 실패: ' + e.message);
      }
    }

    // 페이지 로드 시 카테고리 로드
    document.addEventListener('DOMContentLoaded', () => {
      startCliPolling();
      loadNetworkInfo();
      loadUserFolders();
    });
  </script>
</body>
</html>
