<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모바일 음식 설문</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #f5f7fb;
      color: #172033;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 16px;
    }

    main {
      max-width: 560px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 14px;
    }

    h1 {
      font-size: 1.45rem;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .muted {
      color: #64748b;
      line-height: 1.4;
    }

    .panel {
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #334155;
      font-weight: 700;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 1rem;
    }

    .step-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-bottom: 12px;
    }

    .step-tab {
      min-height: 38px;
      border: 1px solid #dbe3ef;
      border-radius: 6px;
      background: #fff;
      color: #64748b;
      font-size: 0.86rem;
      font-weight: 800;
    }

    .step-tab.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }

    .step-tab.done {
      background: #dcfce7;
      border-color: #86efac;
      color: #166534;
    }

    .chooser-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      font-size: 1.18rem;
      line-height: 1.3;
    }

    .level {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 0.82rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .path {
      min-height: 22px;
      margin-bottom: 10px;
      color: #475569;
      font-size: 0.94rem;
      font-weight: 700;
      line-height: 1.35;
    }

    .tile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .tile {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      color: #1e293b;
      padding: 10px;
      font-size: clamp(0.9rem, 3.6vw, 1.05rem);
      font-weight: 850;
      line-height: 1.25;
      text-align: center;
      display: grid;
      place-items: center;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .tile:active {
      transform: scale(0.98);
    }

    .tile.primary {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .tile.secondary {
      border-color: #99f6e4;
      background: #f0fdfa;
    }

    .tile.food {
      border-color: #bbf7d0;
      background: #f0fdf4;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 12px;
    }

    .action {
      min-height: 46px;
      border: 0;
      border-radius: 7px;
      background: #64748b;
      color: #fff;
      font-size: 0.98rem;
      font-weight: 800;
    }

    .action.skip {
      background: #475569;
    }

    .submit {
      position: sticky;
      bottom: 12px;
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 7px;
      background: #16a34a;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 850;
      box-shadow: 0 10px 24px rgba(22, 163, 74, 0.25);
    }

    .submit:disabled {
      background: #94a3b8;
      box-shadow: none;
    }

    .summary {
      display: grid;
      gap: 7px;
      margin-top: 12px;
    }

    .summary-row {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 7px 9px;
      color: #334155;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .summary-row button {
      border: 0;
      background: transparent;
      color: #2563eb;
      font-weight: 850;
      font-size: 0.9rem;
    }

    .status {
      display: none;
      margin: 12px 0;
      padding: 12px;
      border-radius: 7px;
      font-weight: 750;
      line-height: 1.4;
    }

    .status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
    }

    .status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
    }

    @media (min-width: 500px) {
      .tile-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>음식 선호 설문</h1>
      <p class="muted">대분류, 중분류, 소분류를 차례로 선택합니다.</p>
    </header>

    <section class="panel">
      <label for="userId">이름 또는 별명</label>
      <input id="userId" type="text" placeholder="비워두면 자동 번호가 붙습니다">
    </section>

    <section class="panel">
      <div class="step-tabs" id="stepTabs"></div>
      <div class="chooser-head">
        <div>
          <h2 id="groupTitle">좋아하는 음식</h2>
          <p id="groupHint" class="muted">필수</p>
        </div>
        <span id="levelLabel" class="level">대분류</span>
      </div>
      <div id="selectedPath" class="path"></div>
      <div id="tileGrid" class="tile-grid"></div>
      <div class="actions">
        <button id="backButton" class="action" type="button" onclick="goBack()">이전</button>
        <button id="skipButton" class="action skip" type="button" onclick="skipGroup()">건너뛰기</button>
      </div>
      <div class="summary" id="summary"></div>
    </section>

    <div id="status" class="status"></div>
    <button id="submitButton" class="submit" type="button" onclick="submitSurvey()">제출하기</button>
  </main>

  <script>
    const sessionId = '{{ session_id }}';
    const groups = [
      {key: 'like', title: '좋아하는 음식', hint: '필수'},
      {key: 'dislike', title: '싫어하는 음식', hint: '선택'},
      {key: 'recent', title: '최근 먹은 음식', hint: '선택'}
    ];
    const levels = ['high', 'mid', 'food'];
    const levelLabels = {high: '대분류', mid: '중분류', food: '소분류'};
    const tileClasses = {high: 'primary', mid: 'secondary', food: 'food'};
    const state = {
      like: {high: '', mid: '', food: ''},
      dislike: {high: '', mid: '', food: ''},
      recent: {high: '', mid: '', food: ''}
    };
    let categories = [];
    let currentGroupIndex = 0;
    let currentLevelIndex = 0;

    async function loadSurvey() {
      const sessionResponse = await fetch(`/api/session/${sessionId}`);
      if (!sessionResponse.ok) {
        showStatus('세션을 찾을 수 없습니다.', 'error');
        document.getElementById('submitButton').disabled = true;
        return;
      }
      const session = await sessionResponse.json();
      if (!session.mobile_enabled || session.status !== 'collecting') {
        showStatus('현재 모바일 접수가 열려 있지 않습니다.', 'error');
        document.getElementById('submitButton').disabled = true;
        return;
      }

      const response = await fetch('/api/categories');
      categories = await response.json();
      render();
    }

    function render() {
      renderTabs();
      renderChooser();
      renderSummary();
      updateSubmitButton();
    }

    function renderTabs() {
      const activeKey = groups[currentGroupIndex].key;
      document.getElementById('stepTabs').innerHTML = groups.map(group => {
        const done = isGroupComplete(group.key);
        const className = [
          'step-tab',
          group.key === activeKey ? 'active' : '',
          done ? 'done' : ''
        ].filter(Boolean).join(' ');
        return `<button type="button" class="${className}" onclick="editGroup('${group.key}')">${group.title}</button>`;
      }).join('');
    }

    function renderChooser() {
      const group = groups[currentGroupIndex];
      const groupState = state[group.key];
      const level = levels[currentLevelIndex];
      document.getElementById('groupTitle').textContent = group.title;
      document.getElementById('groupHint').textContent = group.hint;
      document.getElementById('levelLabel').textContent = levelLabels[level];
      document.getElementById('selectedPath').textContent = buildPathText(groupState);
      document.getElementById('backButton').disabled = currentGroupIndex === 0 && currentLevelIndex === 0;
      document.getElementById('skipButton').style.visibility = group.key === 'like' ? 'hidden' : 'visible';

      getOptions(groupState, level).then(options => {
        const grid = document.getElementById('tileGrid');
        grid.innerHTML = options.map(option => (
          `<button type="button" class="tile ${tileClasses[level]}" onclick="selectOption('${escapeAttr(option)}')">${option}</button>`
        )).join('');
      });
    }

    async function getOptions(groupState, level) {
      if (level === 'high') {
        return categories;
      }
      if (level === 'mid') {
        if (!groupState.high) {
          return [];
        }
        const response = await fetch(`/api/subcategories/${encodeURIComponent(groupState.high)}`);
        return response.json();
      }
      if (!groupState.high || !groupState.mid) {
        return [];
      }
      const response = await fetch(`/api/foods/${encodeURIComponent(groupState.high)}/${encodeURIComponent(groupState.mid)}`);
      return response.json();
    }

    function selectOption(value) {
      const group = groups[currentGroupIndex];
      const groupState = state[group.key];
      const level = levels[currentLevelIndex];
      groupState[level] = value;

      if (level === 'high') {
        groupState.mid = '';
        groupState.food = '';
      }
      if (level === 'mid') {
        groupState.food = '';
      }

      if (currentLevelIndex < levels.length - 1) {
        currentLevelIndex += 1;
      } else {
        moveToNextGroup();
      }
      render();
    }

    function moveToNextGroup() {
      if (currentGroupIndex < groups.length - 1) {
        currentGroupIndex += 1;
        currentLevelIndex = 0;
      }
    }

    function goBack() {
      if (currentLevelIndex > 0) {
        currentLevelIndex -= 1;
      } else if (currentGroupIndex > 0) {
        currentGroupIndex -= 1;
        currentLevelIndex = firstIncompleteLevel(groups[currentGroupIndex].key);
      }
      render();
    }

    function skipGroup() {
      const group = groups[currentGroupIndex];
      if (group.key === 'like') {
        return;
      }
      state[group.key] = {high: '', mid: '', food: ''};
      moveToNextGroup();
      render();
    }

    function editGroup(groupKey) {
      currentGroupIndex = groups.findIndex(group => group.key === groupKey);
      currentLevelIndex = firstIncompleteLevel(groupKey);
      render();
    }

    function firstIncompleteLevel(groupKey) {
      const groupState = state[groupKey];
      if (!groupState.high) {
        return 0;
      }
      if (!groupState.mid) {
        return 1;
      }
      if (!groupState.food) {
        return 2;
      }
      return 0;
    }

    function isGroupComplete(groupKey) {
      const groupState = state[groupKey];
      return Boolean(groupState.high && groupState.mid && groupState.food);
    }

    function buildPathText(groupState) {
      return [groupState.high, groupState.mid, groupState.food].filter(Boolean).join(' > ');
    }

    function renderSummary() {
      document.getElementById('summary').innerHTML = groups.map(group => {
        const text = buildPathText(state[group.key]) || '선택 없음';
        return `
          <div class="summary-row">
            <span>${group.title}: ${text}</span>
            <button type="button" onclick="editGroup('${group.key}')">수정</button>
          </div>
        `;
      }).join('');
    }

    function updateSubmitButton() {
      document.getElementById('submitButton').disabled = !isGroupComplete('like');
    }

    async function submitSurvey() {
      if (!isGroupComplete('like')) {
        showStatus('좋아하는 음식은 소분류까지 선택해주세요.', 'error');
        return;
      }

      const button = document.getElementById('submitButton');
      button.disabled = true;
      button.textContent = '제출 중...';

      const payload = {
        source: 'mobile',
        user_id: document.getElementById('userId').value.trim(),
        like_high: [state.like.high].filter(Boolean),
        like_low: [buildLowValue(state.like)].filter(Boolean),
        dislike_high: [state.dislike.high].filter(Boolean),
        dislike_low: [buildLowValue(state.dislike)].filter(Boolean),
        recent_high: [state.recent.high].filter(Boolean),
        recent_low: [buildLowValue(state.recent)].filter(Boolean)
      };

      try {
        const response = await fetch(`/api/session/${sessionId}/add-participant`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || '제출 실패');
        }
        showStatus(`접수되었습니다. 현재 ${data.participant_count}명이 참여했습니다.`, 'success');
        button.textContent = '제출 완료';
      } catch (e) {
        button.disabled = false;
        button.textContent = '제출하기';
        showStatus(e.message, 'error');
      }
    }

    function buildLowValue(groupState) {
      if (!groupState.high || !groupState.mid || !groupState.food) {
        return '';
      }
      return `${groupState.high}|${groupState.mid}|${groupState.food}`;
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status ${type}`;
    }

    function escapeAttr(value) {
      return String(value).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }

    document.addEventListener('DOMContentLoaded', loadSurvey);
  </script>
</body>
</html>
