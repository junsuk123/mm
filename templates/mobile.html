<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>음식 선호 설문</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 16px; background: #f5f7fb; color: #172033; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { max-width: 560px; margin: auto; }
    h1 { margin: 0 0 6px; font-size: 1.55rem; }
    .intro { color: #64748b; margin: 0 0 16px; line-height: 1.5; }
    .panel { background: white; border: 1px solid #dbe3ef; border-radius: 12px; padding: 16px; margin-bottom: 14px; box-shadow: 0 8px 24px rgba(15,23,42,.05); }
    .panel h2 { margin: 0 0 6px; font-size: 1.1rem; color: #334155; }
    .panel p { color: #64748b; margin: 0 0 14px; font-size: .92rem; }
    label { display: block; margin: 12px 0 6px; font-weight: 750; color: #334155; }
    input, select { width: 100%; min-height: 48px; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 8px; background: white; font-size: 1rem; }
    button { width: 100%; min-height: 52px; border: 0; border-radius: 9px; background: #2563eb; color: white; font-size: 1.05rem; font-weight: 800; }
    button:disabled { background: #94a3b8; }
    .status { display: none; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-weight: 700; }
    .status.error { display: block; background: #fee2e2; color: #991b1b; }
    .status.success { display: block; background: #dcfce7; color: #166534; }
  </style>
</head>
<body>
  <main>
    <h1>음식 선호 설문</h1>
    <p class="intro">최근 음식 1개와 선호 분류만 선택합니다. 싫어하는 음식이나 기타 개인정보는 받지 않습니다.</p>
    <section class="panel">
      <label for="userId">이름 또는 별명</label>
      <input id="userId" placeholder="비워두면 자동 번호가 붙습니다">
    </section>
    <section class="panel">
      <h2>1. 최근 먹은 음식</h2>
      <p>대분류와 소분류를 하나씩 정확하게 선택해주세요.</p>
      <label>대분류</label><select id="recentMain" onchange="loadSubs('recent')"><option value="">선택...</option></select>
      <label>소분류</label><select id="recentSubcategory"><option value="">선택...</option></select>
    </section>
    <section class="panel">
      <h2>2. 선호 음식 1</h2>
      <p>대분류 하나와 서로 다른 소분류 두 개를 선택합니다.</p>
      <label>대분류</label><select id="preferredMain1" onchange="loadSubs(1)"><option value="">선택...</option></select>
      <label>소분류 1</label><select id="preferredSub1A"><option value="">선택...</option></select>
      <label>소분류 2</label><select id="preferredSub1B"><option value="">선택...</option></select>
    </section>
    <section class="panel">
      <h2>3. 선호 음식 2</h2>
      <p>첫 번째와 다른 대분류를 선택해주세요.</p>
      <label>대분류</label><select id="preferredMain2" onchange="loadSubs(2)"><option value="">선택...</option></select>
      <label>소분류 1</label><select id="preferredSub2A"><option value="">선택...</option></select>
      <label>소분류 2</label><select id="preferredSub2B"><option value="">선택...</option></select>
    </section>
    <div id="status" class="status"></div>
    <button id="submitButton" onclick="submitSurvey()">제출하기</button>
  </main>
  <script>
    const sessionId = '{{ session_id }}';
    async function initialize() {
      const response = await fetch(`/api/session/${sessionId}`);
      if (!response.ok) return disable('세션을 찾을 수 없습니다.');
      const session = await response.json();
      if (!session.mobile_enabled || session.status !== 'collecting') return disable('현재 모바일 접수가 열려 있지 않습니다.');
      const categories = await (await fetch('/api/categories')).json();
      ['recentMain', 'preferredMain1', 'preferredMain2'].forEach(id => {
        categories.forEach(value => document.getElementById(id).add(new Option(value, value)));
      });
    }
    async function loadSubs(slot) {
      const recent = slot === 'recent';
      const main = document.getElementById(recent ? 'recentMain' : `preferredMain${slot}`).value;
      const ids = recent ? ['recentSubcategory'] : [`preferredSub${slot}A`, `preferredSub${slot}B`];
      ids.forEach(id => document.getElementById(id).innerHTML = '<option value="">선택...</option>');
      if (!main) return;
      const values = await (await fetch(`/api/subcategories/${encodeURIComponent(main)}`)).json();
      ids.forEach(id => values.forEach(value => document.getElementById(id).add(new Option(value, value))));
    }
    function formData() {
      return {
        source: 'mobile',
        user_id: document.getElementById('userId').value.trim(),
        recent_main: document.getElementById('recentMain').value,
        recent_subcategory: document.getElementById('recentSubcategory').value,
        preferred: [1, 2].map(slot => ({
          main: document.getElementById(`preferredMain${slot}`).value,
          subcategories: [
            document.getElementById(`preferredSub${slot}A`).value,
            document.getElementById(`preferredSub${slot}B`).value
          ]
        }))
      };
    }
    function valid(data) {
      const mains = data.preferred.map(item => item.main);
      return data.recent_main && data.recent_subcategory
        && mains.every(Boolean) && new Set(mains).size === 2
        && data.preferred.every(item => item.subcategories.every(Boolean) && new Set(item.subcategories).size === 2);
    }
    async function submitSurvey() {
      const data = formData();
      if (!valid(data)) return show('모든 항목을 선택하고 선택값이 서로 겹치지 않게 해주세요.', 'error');
      const button = document.getElementById('submitButton');
      button.disabled = true;
      button.textContent = '제출 중...';
      try {
        const response = await fetch(`/api/session/${sessionId}/add-participant`, {
          method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
        });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || '제출 실패');
        show(`접수되었습니다. 현재 ${result.participant_count}명이 참여했습니다.`, 'success');
        button.textContent = '제출 완료';
      } catch (error) {
        button.disabled = false;
        button.textContent = '제출하기';
        show(error.message, 'error');
      }
    }
    function show(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = `status ${type}`;
    }
    function disable(message) {
      show(message, 'error');
      document.getElementById('submitButton').disabled = true;
    }
    document.addEventListener('DOMContentLoaded', initialize);
  </script>
</body>
</html>
